name: Publish Dictionary Data

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "data/words/**"
      - "data/examples/**"
      - "data/rules/**"
      - "scripts/build-index.ts"
      - "src/utils/verb-forms.js"

jobs:
  publish-db:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build search index
        run: npm run build-index

      - name: Download previous DB from latest data release
        id: prev-db
        run: |
          # Try to download the DB from the most recent data-* release
          LATEST_TAG=$(gh release list --limit 20 --json tagName --jq '[.[] | select(.tagName | startswith("data-"))][0].tagName // empty')
          if [ -n "$LATEST_TAG" ]; then
            echo "Downloading previous DB from release $LATEST_TAG"
            gh release download "$LATEST_TAG" --pattern "lexiklar.db" --dir /tmp/prev || true
          fi
          if [ -f /tmp/prev/lexiklar.db ]; then
            echo "old_db=/tmp/prev/lexiklar.db" >> "$GITHUB_OUTPUT"
          else
            echo "No previous DB found — will publish full DB only"
            echo "old_db=" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate release assets and manifest
        id: publish
        run: |
          mkdir -p /tmp/release-assets

          # Build release tag from date + short version hash
          DB_VERSION=$(node -e '
            const Database = require("better-sqlite3");
            const db = new Database("data/lexiklar.db", { readonly: true });
            process.stdout.write(db.prepare("SELECT value FROM meta WHERE key = ?").get("version").value);
          ')
          TAG="data-$(date +%Y%m%d)-${DB_VERSION:0:8}"
          CDN_URL="https://cdn.lexiklar.app"

          OLD_DB_FLAG=""
          if [ -n "${{ steps.prev-db.outputs.old_db }}" ]; then
            OLD_DB_FLAG="--old ${{ steps.prev-db.outputs.old_db }}"
          fi

          # Download existing manifest from R2 (to preserve bundle section + old patches)
          curl -sf "${CDN_URL}/manifest.json" -o /tmp/release-assets/manifest.json 2>/dev/null || true

          npx tsx scripts/publish-update.ts \
            $OLD_DB_FLAG \
            --out /tmp/release-assets \
            --release-url "$CDN_URL"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "db_version=$DB_VERSION" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload assets to R2 CDN
        run: |
          # Install wrangler for R2 uploads
          npm i -g wrangler@4

          # Upload DB files
          wrangler r2 object put lexiklar-data/lexiklar.db \
            --file /tmp/release-assets/lexiklar.db \
            --content-type application/octet-stream --remote
          wrangler r2 object put lexiklar-data/lexiklar.db.gz \
            --file /tmp/release-assets/lexiklar.db.gz \
            --content-type application/gzip --remote

          # Upload SQL patches
          for f in /tmp/release-assets/*.sql; do
            [ -f "$f" ] || continue
            FNAME=$(basename "$f")
            wrangler r2 object put "lexiklar-data/patches/${FNAME}" \
              --file "$f" \
              --content-type text/plain --remote
          done

          # Upload manifest
          wrangler r2 object put lexiklar-data/manifest.json \
            --file /tmp/release-assets/manifest.json \
            --content-type application/json --remote

          echo "Uploaded to cdn.lexiklar.app"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
