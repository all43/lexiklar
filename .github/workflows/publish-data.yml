name: Publish Dictionary Data

on:
  workflow_dispatch:
    inputs:
      publish_bundle:
        description: "Also publish app bundle (Capawesome OTA)"
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - "data/words/**"
      - "data/examples/**"
      - "data/rules/**"
      - "scripts/build-index.ts"
      - "src/utils/verb-forms.js"

jobs:
  publish-db:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build search index
        run: npm run build-index

      - name: Download previous DB from latest data release
        id: prev-db
        run: |
          # Try to download the DB from the most recent data-* release
          LATEST_TAG=$(gh release list --limit 20 --json tagName --jq '[.[] | select(.tagName | startswith("data-"))][0].tagName // empty')
          if [ -n "$LATEST_TAG" ]; then
            echo "Downloading previous DB from release $LATEST_TAG"
            gh release download "$LATEST_TAG" --pattern "lexiklar.db" --dir /tmp/prev || true
          fi
          if [ -f /tmp/prev/lexiklar.db ]; then
            echo "old_db=/tmp/prev/lexiklar.db" >> "$GITHUB_OUTPUT"
          else
            echo "No previous DB found — will publish full DB only"
            echo "old_db=" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate release assets and manifest
        id: publish
        run: |
          mkdir -p /tmp/release-assets

          # Build release tag from date + short version hash
          DB_VERSION=$(node -p "
            const Database = require('better-sqlite3');
            const db = new Database('data/lexiklar.db', { readonly: true });
            db.prepare('SELECT value FROM meta WHERE key = \"version\"').get().value;
          ")
          TAG="data-$(date +%Y%m%d)-${DB_VERSION:0:8}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"

          OLD_DB_FLAG=""
          if [ -n "${{ steps.prev-db.outputs.old_db }}" ]; then
            OLD_DB_FLAG="--old ${{ steps.prev-db.outputs.old_db }}"
          fi

          # Download existing manifest from the permanent manifest release (to preserve bundle section + old patches)
          gh release download manifest --pattern "manifest.json" --dir /tmp/release-assets 2>/dev/null || true

          npx tsx scripts/publish-update.ts \
            $OLD_DB_FLAG \
            --out /tmp/release-assets \
            --release-url "$RELEASE_URL"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "db_version=$DB_VERSION" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create data release
        run: |
          TAG="${{ steps.publish.outputs.tag }}"
          # Upload DB + any patch .sql files as release assets
          ASSETS=(/tmp/release-assets/lexiklar.db)
          for f in /tmp/release-assets/*.sql; do
            [ -f "$f" ] && ASSETS+=("$f")
          done
          gh release create "$TAG" "${ASSETS[@]}" \
            --title "Data update $(date +%Y-%m-%d)" \
            --notes "DB version: ${{ steps.publish.outputs.db_version }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update manifest release
        run: |
          # Create the permanent manifest release if it doesn't exist
          if ! gh release view manifest >/dev/null 2>&1; then
            gh release create manifest --title "Update manifest" \
              --notes "Permanent release holding the unified update manifest. Do not delete."
          fi
          # Upload/overwrite manifest.json
          gh release upload manifest /tmp/release-assets/manifest.json --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-bundle:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish_bundle == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build app
        run: npm run build

      - name: Create bundle release
        id: bundle
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="app-v${VERSION}"
          mkdir -p /tmp/bundle-assets
          cd dist && zip -r "/tmp/bundle-assets/${VERSION}.zip" .
          cd ..
          BUNDLE_SIZE=$(stat --format=%s "/tmp/bundle-assets/${VERSION}.zip" 2>/dev/null || stat -f%z "/tmp/bundle-assets/${VERSION}.zip")
          BUNDLE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${VERSION}.zip"

          gh release create "$TAG" "/tmp/bundle-assets/${VERSION}.zip" \
            --title "App v${VERSION}" \
            --notes "App bundle for Capawesome live update"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "url=$BUNDLE_URL" >> "$GITHUB_OUTPUT"
          echo "size=$BUNDLE_SIZE" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update manifest with bundle info
        run: |
          # Download current manifest
          mkdir -p /tmp/manifest
          gh release download manifest --pattern "manifest.json" --dir /tmp/manifest 2>/dev/null || echo '{}' > /tmp/manifest/manifest.json

          # Update bundle section using node
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('/tmp/manifest/manifest.json', 'utf-8'));
            m.bundle = {
              current_version: '${{ steps.bundle.outputs.version }}',
              url: '${{ steps.bundle.outputs.url }}',
              size: ${{ steps.bundle.outputs.size }}
            };
            fs.writeFileSync('/tmp/manifest/manifest.json', JSON.stringify(m, null, 2) + '\n');
          "

          # Create manifest release if needed
          if ! gh release view manifest >/dev/null 2>&1; then
            gh release create manifest --title "Update manifest" \
              --notes "Permanent release holding the unified update manifest. Do not delete."
          fi
          gh release upload manifest /tmp/manifest/manifest.json --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
