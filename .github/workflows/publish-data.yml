name: Publish Dictionary Data

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "data/words/**"
      - "data/examples/**"
      - "data/rules/**"
      - "scripts/build-index.ts"
      - "src/utils/verb-forms.js"

jobs:
  publish-db:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Restore previous DB hashes from cache
        id: prev-hashes
        uses: actions/cache/restore@v4
        with:
          path: /tmp/db-hashes.json
          key: published-db-hashes-placeholder
          restore-keys: published-db-hashes-

      - name: Build search index
        run: npm run build-index

      - name: Generate release assets and manifest
        id: publish
        run: |
          mkdir -p /tmp/release-assets

          DB_VERSION=$(node -e '
            const Database = require("better-sqlite3");
            const db = new Database("data/lexiklar.db", { readonly: true });
            process.stdout.write(db.prepare("SELECT value FROM meta WHERE key = ?").get("version").value);
          ')
          CDN_URL="https://cdn.lexiklar.app"

          OLD_HASHES_FLAG=""
          if [ -f /tmp/db-hashes.json ]; then
            OLD_HASHES_FLAG="--old-hashes /tmp/db-hashes.json"
          fi

          # Download existing manifest from R2 (to preserve bundle section + old patches)
          curl -sf "${CDN_URL}/manifest.json" -o /tmp/release-assets/manifest.json 2>/dev/null || true

          npx tsx scripts/publish-update.ts \
            $OLD_HASHES_FLAG \
            --out /tmp/release-assets \
            --release-url "$CDN_URL"

          # Copy hashes to the path expected by the cache restore step
          cp /tmp/release-assets/db-hashes.json /tmp/db-hashes.json

          echo "db_version=$DB_VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload assets to R2 CDN
        run: |
          npm i -g wrangler@4

          wrangler r2 object put lexiklar-data/lexiklar.db.gz \
            --file /tmp/release-assets/lexiklar.db.gz \
            --content-type application/gzip --remote

          for f in /tmp/release-assets/*.sql.gz; do
            [ -f "$f" ] || continue
            FNAME=$(basename "$f")
            wrangler r2 object put "lexiklar-data/patches/${FNAME}" \
              --file "$f" \
              --content-type application/gzip --remote
          done

          wrangler r2 object put lexiklar-data/manifest.json \
            --file /tmp/release-assets/manifest.json \
            --content-type application/json --remote

          echo "Uploaded to cdn.lexiklar.app"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Save DB hashes to cache for next run
        uses: actions/cache/save@v4
        with:
          path: /tmp/release-assets/db-hashes.json
          key: published-db-hashes-${{ steps.publish.outputs.db_version }}
