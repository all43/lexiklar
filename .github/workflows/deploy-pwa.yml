name: Deploy PWA to Cloudflare Pages

on:
  workflow_dispatch:
    inputs:
      publish_bundle:
        description: "Also publish app bundle (Capawesome OTA)"
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "vite.config.ts"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "types/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build app
        run: npm run build

      - name: Remove DB from dist (served from GitHub Releases)
        run: rm -f dist/data/lexiklar.db

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          wranglerVersion: "4"
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name lexiklar

  publish-bundle:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish_bundle == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build app
        run: npm run build

      - name: Create bundle release
        id: bundle
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="app-v${VERSION}"
          mkdir -p /tmp/bundle-assets
          cd dist && zip -r "/tmp/bundle-assets/${VERSION}.zip" .
          cd ..
          BUNDLE_SIZE=$(stat --format=%s "/tmp/bundle-assets/${VERSION}.zip" 2>/dev/null || stat -f%z "/tmp/bundle-assets/${VERSION}.zip")
          BUNDLE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${VERSION}.zip"

          gh release create "$TAG" "/tmp/bundle-assets/${VERSION}.zip" \
            --title "App v${VERSION}" \
            --notes "App bundle for Capawesome live update"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "url=$BUNDLE_URL" >> "$GITHUB_OUTPUT"
          echo "size=$BUNDLE_SIZE" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update manifest with bundle info
        run: |
          npm i -g wrangler@4

          # Download current manifest from R2
          mkdir -p /tmp/manifest
          curl -sf "https://cdn.lexiklar.app/manifest.json" -o /tmp/manifest/manifest.json 2>/dev/null || echo '{}' > /tmp/manifest/manifest.json

          # Update bundle section using node
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('/tmp/manifest/manifest.json', 'utf-8'));
            m.bundle = {
              current_version: '${{ steps.bundle.outputs.version }}',
              url: '${{ steps.bundle.outputs.url }}',
              size: ${{ steps.bundle.outputs.size }}
            };
            fs.writeFileSync('/tmp/manifest/manifest.json', JSON.stringify(m, null, 2) + '\n');
          "

          # Upload manifest to R2
          wrangler r2 object put lexiklar-data/manifest.json \
            --file /tmp/manifest/manifest.json \
            --content-type application/json --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
