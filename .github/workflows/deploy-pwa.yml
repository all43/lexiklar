name: Deploy PWA to Cloudflare Pages

on:
  workflow_dispatch:
    inputs:
      publish_bundle:
        description: "Also publish app bundle (Capawesome OTA)"
        type: boolean
        default: false
  push:
    branches: [main]
    paths-ignore:
      - "data/**"
      - "scripts/**"
      - "config/**"
      - "prompts/**"
      - "reports/**"
      - "workers/**"
      - "ios/**"
      - "android/**"
      - "icon-drafts/**"
      - "icons/**"
      - "store/**"
      - "tests/**"
      - ".claude/**"
      - ".github/workflows/publish-data.yml"
      - "*.md"
      - "LICENSE"
      - "capacitor.config.json"
      - "tsconfig.scripts.json"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build app
        run: npm run build

      - name: Remove DB from dist (served from GitHub Releases)
        run: rm -f dist/data/lexiklar.db

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          wranglerVersion: "4"
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name lexiklar

  publish-bundle:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish_bundle == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build app
        run: npm run build

      - name: Upload bundle to R2 and update manifest
        run: |
          npm i -g wrangler@4

          VERSION=$(node -p "require('./package.json').version")
          mkdir -p /tmp/bundle-assets
          cd dist && zip -r "/tmp/bundle-assets/${VERSION}.zip" .
          cd ..
          BUNDLE_SIZE=$(stat --format=%s "/tmp/bundle-assets/${VERSION}.zip" 2>/dev/null || stat -f%z "/tmp/bundle-assets/${VERSION}.zip")
          BUNDLE_URL="https://cdn.lexiklar.app/bundles/${VERSION}.zip"

          # Upload bundle zip to R2
          wrangler r2 object put "lexiklar-data/bundles/${VERSION}.zip" \
            --file "/tmp/bundle-assets/${VERSION}.zip" \
            --content-type application/zip --remote

          # Download current manifest from R2
          mkdir -p /tmp/manifest
          curl -sf "https://cdn.lexiklar.app/manifest.json" -o /tmp/manifest/manifest.json 2>/dev/null || echo '{}' > /tmp/manifest/manifest.json

          # Update bundle section
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('/tmp/manifest/manifest.json', 'utf-8'));
            m.bundle = {
              current_version: '${VERSION}',
              url: '${BUNDLE_URL}',
              size: ${BUNDLE_SIZE}
            };
            fs.writeFileSync('/tmp/manifest/manifest.json', JSON.stringify(m, null, 2) + '\n');
          "

          # Upload manifest to R2
          wrangler r2 object put lexiklar-data/manifest.json \
            --file /tmp/manifest/manifest.json \
            --content-type application/json --remote

          echo "Uploaded bundle v${VERSION} ($(( BUNDLE_SIZE / 1024 )) KB) to cdn.lexiklar.app"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
