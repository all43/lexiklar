<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg9" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1e88e5"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg9)"/>
  <!-- Abstract turning pages / fan -->
  <g transform="translate(256, 420)">
    <!-- Page 1 (back) -->
    <path d="M-20,-320 L-100,-320 Q-110,-320 -110,-310 L-110,0" fill="none" stroke="#fff" stroke-width="6" opacity="0.2" transform="rotate(-25)"/>
    <!-- Page 2 -->
    <path d="M-20,-320 L-100,-320 Q-110,-320 -110,-310 L-110,0" fill="none" stroke="#fff" stroke-width="6" opacity="0.35" transform="rotate(-15)"/>
    <!-- Page 3 -->
    <rect x="-100" y="-330" width="80" height="330" rx="6" fill="#fff" opacity="0.15" transform="rotate(-5)"/>
    <path d="M-20,-320 L-100,-320 Q-110,-320 -110,-310 L-110,0" fill="none" stroke="#fff" stroke-width="6" opacity="0.5" transform="rotate(-5)"/>
    <!-- Page 4 (front, with content) -->
    <rect x="-100" y="-330" width="80" height="330" rx="6" fill="#fff" opacity="0.25" transform="rotate(5)"/>
    <path d="M-20,-320 L-100,-320 Q-110,-320 -110,-310 L-110,0" fill="none" stroke="#fff" stroke-width="8" opacity="0.7" transform="rotate(5)"/>
    <!-- Page 5 -->
    <rect x="-100" y="-330" width="80" height="330" rx="6" fill="#fff" opacity="0.35" transform="rotate(15)"/>
    <path d="M-20,-320 L-100,-320 Q-110,-320 -110,-310 L-110,0" fill="none" stroke="#fff" stroke-width="8" opacity="0.9" transform="rotate(15)"/>
  </g>
  <!-- "L" overlay -->
  <text x="280" y="300" font-family="Georgia, serif" font-size="200" font-weight="bold" fill="#fff" text-anchor="middle" opacity="0.9">L</text>
</svg>
