<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#1a73e8"/>
  <!-- Letter tiles scattered -->
  <!-- Tile 1: ä -->
  <g transform="rotate(-8, 140, 160)">
    <rect x="80" y="100" width="120" height="120" rx="16" fill="#fff"/>
    <text x="140" y="185" font-family="Georgia, serif" font-size="80" font-weight="bold" fill="#1a73e8" text-anchor="middle">ä</text>
  </g>
  <!-- Tile 2: ö -->
  <g transform="rotate(5, 310, 150)">
    <rect x="250" y="90" width="120" height="120" rx="16" fill="#fff"/>
    <text x="310" y="175" font-family="Georgia, serif" font-size="80" font-weight="bold" fill="#0d47a1" text-anchor="middle">ö</text>
  </g>
  <!-- Tile 3: ü -->
  <g transform="rotate(-3, 180, 330)">
    <rect x="120" y="270" width="120" height="120" rx="16" fill="#fff"/>
    <text x="180" y="355" font-family="Georgia, serif" font-size="80" font-weight="bold" fill="#1565c0" text-anchor="middle">ü</text>
  </g>
  <!-- Tile 4: ß -->
  <g transform="rotate(10, 340, 320)">
    <rect x="280" y="260" width="120" height="120" rx="16" fill="#fff"/>
    <text x="340" y="348" font-family="Georgia, serif" font-size="80" font-weight="bold" fill="#1e88e5" text-anchor="middle">ß</text>
  </g>
</svg>
