<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#1e88e5"/>
  <!-- Book pages forming L shape -->
  <!-- Vertical stack of pages -->
  <rect x="120" y="80" width="140" height="300" rx="8" fill="#e3f2fd" opacity="0.9"/>
  <rect x="128" y="80" width="140" height="300" rx="8" fill="#bbdefb" opacity="0.9"/>
  <rect x="136" y="80" width="140" height="300" rx="8" fill="#fff"/>
  <!-- Horizontal stack of pages -->
  <rect x="136" y="340" width="260" height="44" rx="8" fill="#e3f2fd" opacity="0.9"/>
  <rect x="136" y="348" width="260" height="44" rx="8" fill="#bbdefb" opacity="0.9"/>
  <rect x="136" y="356" width="260" height="44" rx="8" fill="#fff"/>
  <!-- Text lines on vertical page -->
  <line x1="160" y1="130" x2="250" y2="130" stroke="#1e88e5" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  <line x1="160" y1="160" x2="240" y2="160" stroke="#1e88e5" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
  <line x1="160" y1="190" x2="255" y2="190" stroke="#1e88e5" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  <line x1="160" y1="220" x2="230" y2="220" stroke="#1e88e5" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
  <line x1="160" y1="250" x2="248" y2="250" stroke="#1e88e5" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  <line x1="160" y1="280" x2="235" y2="280" stroke="#1e88e5" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
</svg>
