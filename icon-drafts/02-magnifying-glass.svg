<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#0d47a1"/>
  <!-- Magnifying glass circle -->
  <circle cx="220" cy="220" r="110" fill="none" stroke="#fff" stroke-width="18"/>
  <!-- Glass fill (subtle) -->
  <circle cx="220" cy="220" r="100" fill="#1565c0" opacity="0.5"/>
  <!-- Handle -->
  <line x1="300" y1="300" x2="400" y2="400" stroke="#fff" stroke-width="24" stroke-linecap="round"/>
  <!-- Letter inside glass -->
  <text x="220" y="260" font-family="Georgia, serif" font-size="140" font-weight="bold" fill="#fff" text-anchor="middle">ü</text>
</svg>
