<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#1565c0"/>
  <!-- Speech bubble -->
  <rect x="80" y="90" width="352" height="240" rx="40" fill="#fff"/>
  <!-- Bubble tail -->
  <polygon points="140,330 180,330 130,400" fill="#fff"/>
  <!-- Text "Lx" stylized -->
  <text x="256" y="255" font-family="Georgia, serif" font-size="150" font-weight="bold" fill="#1565c0" text-anchor="middle">Lx</text>
  <!-- Two dots (umlaut accent) above the x -->
  <circle cx="300" cy="118" r="10" fill="#1565c0"/>
  <circle cx="340" cy="118" r="10" fill="#1565c0"/>
</svg>
