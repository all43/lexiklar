<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg8" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg8)"/>
  <!-- Outer circle -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#fff" stroke-width="10" opacity="0.3"/>
  <!-- Inner circle -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="#fff" stroke-width="4" opacity="0.2"/>
  <!-- Monogram: Lk intertwined -->
  <text x="210" y="320" font-family="Georgia, serif" font-size="240" font-weight="bold" fill="#fff" text-anchor="middle" opacity="0.9">L</text>
  <text x="320" y="300" font-family="Georgia, serif" font-size="160" fill="#fff" text-anchor="middle" opacity="0.7">k</text>
  <!-- Subtle umlaut dots -->
  <circle cx="360" cy="120" r="8" fill="#64b5f6"/>
  <circle cx="390" cy="120" r="8" fill="#64b5f6"/>
</svg>
