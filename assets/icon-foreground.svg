<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Transparent background — background layer is separate (icon-background) -->
  <!-- White card -->
  <rect x="100" y="80" width="312" height="360" rx="20" fill="#fff"/>
  <!-- Book spine -->
  <rect x="100" y="80" width="28" height="360" rx="10" fill="#e8eaf6"/>
  <!-- Red bookmark ribbon -->
  <path d="M340 80 L340 210 L362 185 L384 210 L384 80" fill="#ef5350"/>
  <!-- Hero character ä -->
  <text x="248" y="290" font-family="Georgia, serif" font-size="200" font-weight="bold" fill="#1565c0" text-anchor="middle">ä</text>
  <!-- Separator line -->
  <line x1="155" y1="340" x2="340" y2="340" stroke="#e0e0e0" stroke-width="3"/>
  <!-- Abstract text lines -->
  <line x1="155" y1="370" x2="280" y2="370" stroke="#b0bec5" stroke-width="6" stroke-linecap="round"/>
  <line x1="155" y1="400" x2="320" y2="400" stroke="#cfd8dc" stroke-width="5" stroke-linecap="round"/>
</svg>
