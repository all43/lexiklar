<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e88e5"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <!-- Subtle radial highlight top-left -->
    <radialGradient id="highlight" cx="20%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="500" fill="url(#bg)"/>
  <rect width="1024" height="500" fill="url(#highlight)"/>

  <!-- Icon group, centered vertically, left of center -->
  <!-- White card -->
  <rect x="200" y="100" width="195" height="225" rx="13" fill="#fff"/>
  <!-- Book spine -->
  <rect x="200" y="100" width="18" height="225" rx="6" fill="#e8eaf6"/>
  <!-- Red bookmark ribbon -->
  <path d="M340 100 L340 182 L355 165 L370 182 L370 100" fill="#ef5350"/>
  <!-- Hero character ä -->
  <text x="293" y="255" font-family="Georgia, serif" font-size="125" font-weight="bold" fill="#1565c0" text-anchor="middle">ä</text>
  <!-- Separator line -->
  <line x1="225" y1="275" x2="370" y2="275" stroke="#e0e0e0" stroke-width="2"/>
  <!-- Abstract text lines -->
  <line x1="225" y1="293" x2="330" y2="293" stroke="#b0bec5" stroke-width="4" stroke-linecap="round"/>
  <line x1="225" y1="310" x2="355" y2="310" stroke="#cfd8dc" stroke-width="3" stroke-linecap="round"/>

  <!-- App name -->
  <text x="445" y="230" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="700" fill="#ffffff" text-anchor="start" letter-spacing="-1">Lexiklar</text>

  <!-- Tagline -->
  <text x="447" y="285" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="400" fill="#ffffffcc" text-anchor="start">German Dictionary &amp; Grammar</text>

</svg>
